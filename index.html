<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大和高山 法楽寺 - 仏像・石仏検索</title>
    <style>
        :root {
            --primary-color: #4A3C31;
            --accent-color: #D4AF37;
            --bg-color: #F9F8F6;
            --text-color: #2C2C2C;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 15px; min-height: 100vh; }

        header { text-align: center; padding: 15px 0; border-bottom: 1px solid var(--accent-color); margin-bottom: 20px; }
        h1 { font-size: 1.4rem; letter-spacing: 0.2em; color: var(--primary-color); }

        .page { display: none; animation: fadeIn 0.3s ease forwards; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- スライドショー --- */
        #slideshow-container {
            width: 100%; height: 50vh; display: flex; justify-content: center; align-items: center;
            background: #000; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer;
        }
        #slideshow-img { width: 100%; height: 100%; object-fit: contain; }

        /* 検索グリッド */
        .name-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 15px; }
        .name-btn { background: var(--white); border: 1px solid #ddd; padding: 12px 8px; text-align: center; cursor: pointer; font-size: 0.8rem; border-radius: 4px; }

        /* コントロール */
        .controls-bar { background: #eeeae4; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .control-row { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; }
        .icon-btn { background: var(--white); border: 1px solid #ccc; padding: 6px; cursor: pointer; display: flex; align-items: center; border-radius: 4px; }
        .icon-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .size-btn { font-weight: bold; padding: 4px 12px; font-size: 0.8rem; }
        .txt-btn { padding: 8px 12px; font-size: 0.8rem; background: var(--white); border: 1px solid var(--primary-color); cursor: pointer; border-radius: 4px; }

        /* --- 詳細表示エリア --- */
        .detail-content { background: white; padding: 25px; border-radius: 4px; transition: all 0.3s; min-height: 400px; }
        
        /* 横レイアウト：垂直・水平すべて中央揃え */
        .detail-content.horizontal {
            display: flex;
            flex-direction: row;
            align-items: center; /* 画像とテキストを垂直方向で中央に */
            justify-content: center;
            gap: 25px;
        }
        .detail-content.horizontal .img-area { flex: 0 0 25%; display: flex; justify-content: center; align-items: center; }
        .detail-content.horizontal .info-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; /* 名称とふりがなを水平中央に */
            justify-content: center; 
            text-align: center; /* 説明文を中央揃えに */
        }

        /* 縦レイアウト */
        .detail-content.vertical {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .detail-content.vertical .img-area { width: 100%; display: flex; justify-content: center; margin-bottom: 20px; }
        .detail-content.vertical .info-area { width: 100%; text-align: center; align-items: center; display: flex; flex-direction: column; }

        /* 画像スタイル */
        .clickable-img { 
            width: 100%; max-width: 100%; cursor: zoom-in; transition: all 0.3s ease; border: 1px solid #eee; border-radius: 4px;
        }
        .clickable-img.expanded {
            position: relative; z-index: 100; width: 250% !important; max-width: 90vw; cursor: zoom-out; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .vertical .clickable-img.expanded { width: 100% !important; }

        /* 名称のアンダーライン調整 */
        .info-area h2 { 
            font-size: 1.4rem; 
            margin-bottom: 5px; 
            border-bottom: 2px solid var(--accent-color); 
            display: inline-block; /* 文字幅に合わせる */
            padding-bottom: 2px;
            line-height: 1.2;
        }
        .furigana { font-size: 0.9rem; color: #777; margin-bottom: 15px; display: block; }
        
        .description { line-height: 1.8; text-align: justify; text-justify: inter-character; width: 100%; }
        /* 説明文の中央揃えを強制する場合 */
        .horizontal .description { text-align: center; }

        .f-small { font-size: 0.9rem; }
        .f-medium { font-size: 1.1rem; }
        .f-large { font-size: 1.4rem; }

        /* スマホ向け（横並び時） */
        @media (max-width: 480px) {
            .detail-content.horizontal { gap: 15px; padding: 15px; }
            .detail-content.horizontal .img-area { flex: 0 0 30%; }
            .info-area h2 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header><h1 onclick="location.reload()" style="cursor:pointer">大和高山 法楽寺</h1></header>

    <section id="top" class="page active">
        <div id="slideshow-container" onclick="stopSlideshowAndGo()">
            <img id="slideshow-img" src="" alt="法楽寺 仏像">
        </div>
        <p style="text-align:center; margin-top:10px; font-size:0.7rem; color:#666;">タップして一覧へ</p>
    </section>

    <section id="search-name" class="page">
        <div class="name-grid" id="nameList"></div>
        <div style="text-align:center; margin-top:30px;"><button class="txt-btn" onclick="location.reload()">TOPへ</button></div>
    </section>

    <section id="detail" class="page">
        <div class="controls-bar">
            <div class="control-row">
                <button class="icon-btn" id="btn-vert" onclick="setLayout('vertical')">
                    <svg viewBox="0 0 24 24"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm0 2v16h10V4H7z"/></svg>
                </button>
                <button class="icon-btn" id="btn-hori" onclick="setLayout('horizontal')">
                    <svg viewBox="0 0 24 24"><path d="M22 7v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2zm-2 0H4v10h16V7z"/></svg>
                </button>
                <div style="width:5px;"></div>
                <button class="icon-btn size-btn" id="fs-s" onclick="setFontSize('small')">小</button>
                <button class="icon-btn size-btn" id="fs-m" onclick="setFontSize('medium')">中</button>
                <button class="icon-btn size-btn" id="fs-l" onclick="setFontSize('large')">大</button>
            </div>
            <div class="control-row">
                <button class="txt-btn" onclick="showPage('search-name')">一覧</button>
                <button class="txt-btn" onclick="prevDeity()">前へ</button>
                <button class="txt-btn" onclick="nextDeity()">次へ</button>
            </div>
        </div>
        <div id="detailView"></div>
    </section>
</div>

<script>
    // CSVから取得した全データ
    const buddhaData = [
        { id: 1, name: "薬師如来", furigana: "やくしにょらい", description: "薬師本願功徳経では、薬師如来は東方浄瑠璃世界（瑠璃光浄土とも称される）の教主で、菩薩の時に12の大願を発し、この世門における衆生の疾病を治癒して寿命を延べ、災禍を消去し、衣食などを満足せしめ、かつ仏行を行じては無上菩提の妙果を証らしめんと誓い仏と成ったと説かれる。瑠璃光を以て衆生の病苦を救うとされている。無明の病を直す法薬を与える医薬の仏として、如来には珍しく現世利益信仰を集める。" },
        { id: 2, name: "八幡大菩薩", furigana: "はちまんだいぼさつ", description: "八幡大菩薩は日本で古いから尊崇される守護神で、武運長久だけでなく国家安泰や人々の生活を守る菩薩として信仰されています。" },
        { id: 3, name: "文殊菩薩", furigana: "もんじゅぼさつ", description: "文殊菩薩は「三人寄れば文殊の知恵」といわれるように、すぐれた智慧を象徴する菩薩です。迷いを断ち正しい判断力を授ける存在として、学業成就や進学祈願でも広く信仰されています。" },
        { id: 4, name: "十一面観音菩薩", furigana: "じゅういちめんかんのんぼさつ", description: "十一面観音菩薩は、頭上に十一の顔を持ち、あらゆる方向から衆生を守る観音さまです。" },
        { id: 5, name: "十二天屏風", furigana: "じゅうにてんびょうぶ", description: "十二天とは、仏教を守護する十二の神々の総称です。東西南北の四方、北東・北西・南東・南西の四隅、さらに天地を加えた全方位を護るとされています。" },
        { id: 6, name: "大日如来", furigana: "だいにちにょらい", description: "密教において宇宙そのものとされる根本仏。すべての仏の源とされています。" },
        { id: 7, name: "不動明王", furigana: "ふどうみょうおう", description: "不動明王は、大日如来の化身とされ、激しい憤怒の姿で人々を導き、煩悩や災いを断ち切る強力な守護神です。" },
        { id: 8, name: "大黒天", furigana: "だいこくてん", description: "大黒天は、豊穣と財福を司る神として広く親しまれています。打ち出の小槌を持ち、人々に富と幸福を授ける存在です。" },
        { id: 9, name: "弘法大師立像", furigana: "こうぼうだいしりゅうぞう", description: "真言宗の開祖である弘法大師（空海）の立ち姿を現した像です。修行中や巡礼の姿として、多くの人々に敬われています。" },
        { id: 10, name: "青面金剛石碑", furigana: "しょうめんこんごうせきひ", description: "青面金剛は庚申信仰の本尊で、病魔や災厄を退け、長寿を授ける神として石碑などに刻まれます。" },
        { id: 11, name: "六地蔵菩薩", furigana: "ろくじぞうぼさつ", description: "六地蔵は、仏教の六道（地獄・餓鬼・畜生・修羅・人間・天）を巡り、それぞれの世界で苦しむ人々を救う慈悲深い菩薩です。" },
        { id: 12, name: "三十三観音菩薩", furigana: "さんじゅうさんかんのんぼさつ", description: "観音菩薩が人々を救うために三十三の姿に変身するという信仰に基づいたものです。" },
        { id: 13, name: "地蔵菩薩立像", furigana: "じぞうぼさつりゅうぞう", description: "「お地蔵さま」として親しまれ、子供や旅人を守り、苦しみの身代わりとなって救済する菩薩の立ち姿です。" },
        { id: 14, name: "羅刹天", furigana: "らせつてん", description: "十二天の一人で、南西を護る守護神。力強く、悪鬼を退ける神としての性質を持ちます。" },
        { id: 15, name: "水天", furigana: "すいてん", description: "十二天の一人で、西を護る水の神。水難除けや豊作を祈る対象とされます。" },
        { id: 16, name: "風天", furigana: "ふうてん", description: "十二天の一人で、北西を護る風の神。風の力を制御し、自然の調和を保ちます。" },
        { id: 17, name: "毘沙門天", furigana: "びしゃもんてん", description: "十二天の一人で、北を護る守護神。財宝と勝利を司る神としても名高いです。" },
        { id: 18, name: "日天", furigana: "にってん", description: "十二天の一人で、太陽を神格化した存在。闇を照らし、生命に活力を与えます。" },
        { id: 19, name: "焔摩天", furigana: "えんまてん", description: "十二天の一人で、南を護る神。死後の裁きを行う王として知られますが、慈悲による救いも説かれます。" },
        { id: 20, name: "地天", furigana: "ちてん", description: "十二天の一人で、大地を司る神。安定と恵みをもたらします。" },
        { id: 21, name: "火天", furigana: "かてん", description: "十二天の一人で、南東を護る火の神。知恵の火で煩悩を焼き尽くします。" },
        { id: 22, name: "帝釈天", furigana: "たいしゃくてん", description: "十二天の一人で、東を護る神。諸天の王として、仏教を強く守護します。" },
        { id: 23, name: "伊舎那天", furigana: "いしゃなてん", description: "十二天の一人で、北東を護る神。世界の創造と破壊、そして再生を象徴します。" },
        { id: 24, name: "月天", furigana: "がってん", description: "十二天の一人で、月を神格化した存在。穏やかな光で夜の闇と人々の心を癒します。" },
        { id: 25, name: "梵天", furigana: "ぼんてん", description: "十二天の一人で、上方を護る神。宇宙の創造神としての性格を持ち、高い精神性を象徴します。" },
        { id: 26, name: "龍猛菩薩", furigana: "りゅうみょうぼさつ", description: "真言宗 伝持八祖 第一祖 サンスクリット名：ナーガールジュナ。大乗仏教の「空」の哲学を体系化し、密教思想の基礎を築いた大哲学者。密教の最初の祖師とされています。" },
        { id: 27, name: "龍智菩薩", furigana: "りゅうちぼさつ", description: "真言宗 伝持八祖 第二祖 サンスクリット名：ナーガボーディ。龍猛の弟子とされ、密教の修行法や観想法を整備しました。智慧と瞑想の両立を重視した人物です。" },
        { id: 28, name: "金剛智三蔵", furigana: "こんごうちさんぞう", description: "真言宗 伝持八祖 第三祖。南インド出身。インドから中国へ密教を伝え、多くの経典を翻訳しました。" },
        { id: 29, name: "不空三蔵", furigana: "ふくうさんぞう", description: "真言宗 伝持八祖 第四祖。唐の時代に密教を大いに広め、三代の皇帝に仕えた国師。多くの密教経典を訳出した功労者です。" },
        { id: 30, name: "善無畏三蔵", furigana: "ぜんむいさんぞう", description: "真言宗 伝持八祖 第五祖。中インドの王子として生まれ、中国で「大日経」を訳出した密教の巨星です。" },
        { id: 31, name: "一行阿闍梨", furigana: "いちぎょうあじゃり", description: "真言宗 伝持八祖 第六祖。善無畏に師事し、密教の理論を大成させるとともに、優れた天文学者としても知られます。" },
        { id: 32, name: "恵果阿闍梨", furigana: "けいかあじゃり", description: "真言宗 伝持八祖 第七祖。不空から密教を受け継ぎ、空海にすべてを伝承した唐代密教の完成者です。" },
        { id: 33, name: "弘法大師", furigana: "こうぼうだいし", description: "真言宗 伝持八祖 第八祖。日本における真言密教の開祖。恵果より正当な継承者として認められ、高野山を開きました。" }
    ];

    let currentIndex = 0;
    let currentLayout = 'horizontal'; 
    let currentFontSize = 'medium'; 
    let slideTimer;

    function initSlideshow() {
        const shuffled = [...Array(33).keys()].map(i => i + 1).sort(() => 0.5 - Math.random());
        const images = shuffled.slice(0, 10);
        let count = 0;
        function start() {
            if (count >= 10) { stopSlideshowAndGo(); return; }
            const img = document.getElementById('slideshow-img');
            img.src = `image/${images[count]}.jpg`;
            img.onerror = () => { img.src = `https://via.placeholder.com/400?text=No+Image`; };
            count++;
            slideTimer = setTimeout(start, 250); 
        }
        start();
    }

    function stopSlideshowAndGo() {
        clearTimeout(slideTimer);
        showPage('search-name');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'detail') {
            updateControlUI();
            triggerAutoScroll();
        }
        window.scrollTo(0,0);
    }

    function triggerAutoScroll() {
        if (currentLayout !== 'vertical') return;
        setTimeout(() => {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, 1000);
        }, 300);
    }

    function renderDetail() {
        const data = buddhaData[currentIndex];
        const view = document.getElementById('detailView');
        const fontSizeClass = `f-${currentFontSize}`;
        
        view.className = `detail-content ${currentLayout}`;
        view.innerHTML = `
            <div class="img-area">
                <img src="image/${data.id}.jpg" 
                     class="clickable-img" 
                     onclick="this.classList.toggle('expanded')"
                     onerror="this.src='https://via.placeholder.com/400?text=${encodeURIComponent(data.name)}'">
            </div>
            <div class="info-area">
                <div>
                    <h2>${data.name}</h2>
                    <span class="furigana">${data.furigana}</span>
                </div>
                <p class="description ${fontSizeClass}">${data.description}</p>
                <p style="font-size:0.6rem; color:#aaa; margin-top:15px;">※画像をタップで拡大</p>
            </div>
        `;
    }

    function setLayout(mode) {
        currentLayout = mode;
        updateControlUI();
        renderDetail();
        if(mode === 'vertical') triggerAutoScroll();
    }

    function setFontSize(size) {
        currentFontSize = size;
        updateControlUI();
        renderDetail();
    }

    function updateControlUI() {
        document.getElementById('btn-vert').classList.toggle('active', currentLayout === 'vertical');
        document.getElementById('btn-hori').classList.toggle('active', currentLayout === 'horizontal');
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === `fs-${currentFontSize.charAt(0)}`);
        });
    }

    function nextDeity() { currentIndex = (currentIndex + 1) % buddhaData.length; renderDetail(); triggerAutoScroll(); }
    function prevDeity() { currentIndex = (currentIndex - 1 + buddhaData.length) % buddhaData.length; renderDetail(); triggerAutoScroll(); }

    const nameListDiv = document.getElementById('nameList');
    buddhaData.forEach((item, index) => {
        const btn = document.createElement('div');
        btn.className = 'name-btn';
        btn.innerText = `${item.id}. ${item.name}`;
        btn.onclick = () => { currentIndex = index; renderDetail(); showPage('detail'); };
        nameListDiv.appendChild(btn);
    });

    window.onload = initSlideshow;
</script>
</body>
</html>
